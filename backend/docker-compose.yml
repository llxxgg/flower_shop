version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: flower_shop_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-flower_shop}
      MYSQL_USER: ${MYSQL_USER:-flower_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-flower_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flower_shop_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-flower_user}:${MYSQL_PASSWORD:-flower_password}@mysql:3306/${MYSQL_DATABASE:-flower_shop}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
